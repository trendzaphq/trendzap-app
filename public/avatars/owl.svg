<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#7B5C2A"/>
  <!-- ear tufts -->
  <polygon points="30,34 24,6 44,24" fill="#5A3E18"/>
  <polygon points="70,34 76,6 56,24" fill="#5A3E18"/>
  <!-- face disc -->
  <circle cx="50" cy="55" r="33" fill="#E8C870"/>
  <!-- inner face -->
  <ellipse cx="50" cy="57" rx="24" ry="26" fill="#F5E0A0"/>
  <!-- left big eye -->
  <circle cx="37" cy="49" r="13" fill="#1A0900"/>
  <circle cx="37" cy="49" r="9" fill="#D08030"/>
  <circle cx="37" cy="49" r="5.5" fill="#1A0900"/>
  <circle cx="39" cy="47" r="2" fill="white"/>
  <!-- right big eye -->
  <circle cx="63" cy="49" r="13" fill="#1A0900"/>
  <circle cx="63" cy="49" r="9" fill="#D08030"/>
  <circle cx="63" cy="49" r="5.5" fill="#1A0900"/>
  <circle cx="65" cy="47" r="2" fill="white"/>
  <!-- beak -->
  <polygon points="50,58 45,67 55,67" fill="#E07820"/>
  <!-- hipster glasses on owl -->
  <rect x="24" y="42" width="19" height="14" rx="7" fill="none" stroke="#5A3E18" stroke-width="2.5"/>
  <rect x="57" y="42" width="19" height="14" rx="7" fill="none" stroke="#5A3E18" stroke-width="2.5"/>
  <line x1="43" y1="49" x2="57" y2="49" stroke="#5A3E18" stroke-width="2"/>
</svg>
