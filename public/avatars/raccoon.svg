<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#8090A0"/>
  <!-- left ear -->
  <circle cx="23" cy="25" r="13" fill="#8090A0"/>
  <circle cx="23" cy="25" r="8" fill="#C0B0A8"/>
  <!-- right ear -->
  <circle cx="77" cy="25" r="13" fill="#8090A0"/>
  <circle cx="77" cy="25" r="8" fill="#C0B0A8"/>
  <!-- face -->
  <circle cx="50" cy="57" r="34" fill="#C0C8CC"/>
  <!-- raccoon eye mask -->
  <ellipse cx="36" cy="49" rx="14" ry="11" fill="#2A2A2A"/>
  <ellipse cx="64" cy="49" rx="14" ry="11" fill="#2A2A2A"/>
  <!-- white gap between masks -->
  <ellipse cx="50" cy="49" rx="7" ry="9" fill="#C0C8CC"/>
  <!-- left eye -->
  <circle cx="36" cy="49" r="5.5" fill="#F0F0E8"/>
  <circle cx="36" cy="49" r="3" fill="#1A1A1A"/>
  <circle cx="37" cy="48" r="1.2" fill="white"/>
  <!-- right eye -->
  <circle cx="64" cy="49" r="5.5" fill="#F0F0E8"/>
  <circle cx="64" cy="49" r="3" fill="#1A1A1A"/>
  <circle cx="65" cy="48" r="1.2" fill="white"/>
  <!-- muzzle -->
  <ellipse cx="50" cy="67" rx="16" ry="11" fill="#E0E0D8"/>
  <!-- nose -->
  <ellipse cx="50" cy="62" rx="5" ry="3.5" fill="#222222"/>
  <!-- mouth -->
  <path d="M44 66 Q50 72 56 66" stroke="#6A6A6A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- hipster monocle (single glass) -->
  <circle cx="64" cy="49" r="9" fill="none" stroke="#5A4030" stroke-width="2"/>
  <line x1="73" y1="46" x2="79" y2="38" stroke="#5A4030" stroke-width="2"/>
</svg>
