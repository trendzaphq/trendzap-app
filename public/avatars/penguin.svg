<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#1A1A38"/>
  <!-- white belly/face patch -->
  <ellipse cx="50" cy="62" rx="30" ry="34" fill="#F5F5F5"/>
  <!-- left eye -->
  <circle cx="37" cy="44" r="8" fill="white"/>
  <circle cx="37" cy="44" r="4.5" fill="#1A1A38"/>
  <circle cx="39" cy="42" r="1.8" fill="white"/>
  <!-- right eye -->
  <circle cx="63" cy="44" r="8" fill="white"/>
  <circle cx="63" cy="44" r="4.5" fill="#1A1A38"/>
  <circle cx="65" cy="42" r="1.8" fill="white"/>
  <!-- beak -->
  <polygon points="50,54 44,63 56,63" fill="#FF8C00"/>
  <!-- bow tie (hipster penguin!) -->
  <polygon points="37,77 46,82 37,87" fill="#E63040"/>
  <polygon points="63,77 54,82 63,87" fill="#E63040"/>
  <circle cx="50" cy="82" r="3.5" fill="#C01020"/>
</svg>
