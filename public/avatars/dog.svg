<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#C8823C"/>
  <!-- floppy ears -->
  <ellipse cx="21" cy="46" rx="13" ry="22" fill="#A0622C" transform="rotate(-12 21 46)"/>
  <ellipse cx="79" cy="46" rx="13" ry="22" fill="#A0622C" transform="rotate(12 79 46)"/>
  <!-- face -->
  <circle cx="50" cy="54" r="34" fill="#E8AD70"/>
  <!-- muzzle -->
  <ellipse cx="50" cy="66" rx="18" ry="12" fill="#F5CFA0"/>
  <!-- left eye -->
  <circle cx="37" cy="47" r="6.5" fill="#1A0900"/>
  <circle cx="39" cy="45" r="2" fill="white"/>
  <!-- right eye -->
  <circle cx="63" cy="47" r="6.5" fill="#1A0900"/>
  <circle cx="65" cy="45" r="2" fill="white"/>
  <!-- nose -->
  <ellipse cx="50" cy="60" rx="5.5" ry="4" fill="#7D4A20"/>
  <circle cx="49" cy="59" r="1.5" fill="white" opacity="0.35"/>
  <!-- mouth -->
  <path d="M44 64 Q50 71 56 64" stroke="#7D4A20" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- hipster glasses -->
  <rect x="26" y="40" width="16" height="12" rx="6" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="58" y="40" width="16" height="12" rx="6" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="42" y1="46" x2="58" y2="46" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="26" y1="46" x2="20" y2="44" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="74" y1="46" x2="80" y2="44" stroke="#2a2a2a" stroke-width="2"/>
</svg>
