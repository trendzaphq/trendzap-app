<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#F0A0C0"/>
  <!-- left tall ear -->
  <ellipse cx="35" cy="16" rx="9" ry="24" fill="#F0A0C0"/>
  <ellipse cx="35" cy="16" rx="5.5" ry="19" fill="#FF90B0"/>
  <!-- right tall ear -->
  <ellipse cx="65" cy="16" rx="9" ry="24" fill="#F0A0C0"/>
  <ellipse cx="65" cy="16" rx="5.5" ry="19" fill="#FF90B0"/>
  <!-- face -->
  <circle cx="50" cy="59" r="33" fill="#FFF0F5"/>
  <!-- left eye -->
  <circle cx="37" cy="53" r="6" fill="#C04080"/>
  <circle cx="38.5" cy="51.5" r="1.8" fill="white"/>
  <!-- right eye -->
  <circle cx="63" cy="53" r="6" fill="#C04080"/>
  <circle cx="64.5" cy="51.5" r="1.8" fill="white"/>
  <!-- nose -->
  <ellipse cx="50" cy="63" rx="4" ry="3" fill="#FF80A0"/>
  <!-- mouth -->
  <path d="M46 66 Q50 72 54 66" stroke="#E06090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- hipster glasses -->
  <rect x="26" y="46" width="16" height="11" rx="5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="58" y="46" width="16" height="11" rx="5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="42" y1="51.5" x2="58" y2="51.5" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="26" y1="51.5" x2="20" y2="50" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="74" y1="51.5" x2="80" y2="50" stroke="#2a2a2a" stroke-width="2"/>
</svg>
