<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#9080C0"/>
  <!-- left ear -->
  <polygon points="22,40 18,8 40,28" fill="#9080C0"/>
  <polygon points="24,38 21,14 38,29" fill="#F0C0D8"/>
  <!-- right ear -->
  <polygon points="78,40 82,8 60,28" fill="#9080C0"/>
  <polygon points="76,38 79,14 62,29" fill="#F0C0D8"/>
  <!-- face -->
  <circle cx="50" cy="55" r="33" fill="#C0B0E0"/>
  <!-- left eye -->
  <ellipse cx="37" cy="48" rx="6" ry="7.5" fill="#50A050"/>
  <ellipse cx="37" cy="48" rx="2" ry="5.5" fill="#1A0900"/>
  <circle cx="37.5" cy="46" r="1.5" fill="white"/>
  <!-- right eye -->
  <ellipse cx="63" cy="48" rx="6" ry="7.5" fill="#50A050"/>
  <ellipse cx="63" cy="48" rx="2" ry="5.5" fill="#1A0900"/>
  <circle cx="63.5" cy="46" r="1.5" fill="white"/>
  <!-- nose -->
  <polygon points="50,57 47,62 53,62" fill="#E06080"/>
  <!-- mouth -->
  <path d="M47 62 Q50 66 53 62" stroke="#904050" stroke-width="1.5" fill="none"/>
  <!-- whiskers left -->
  <line x1="20" y1="58" x2="41" y2="60" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="64" x2="41" y2="64" stroke="#888" stroke-width="1" opacity="0.5"/>
  <!-- whiskers right -->
  <line x1="80" y1="58" x2="59" y2="60" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="64" x2="59" y2="64" stroke="#888" stroke-width="1" opacity="0.5"/>
  <!-- bow tie -->
  <polygon points="38,80 47,85 38,90" fill="#E040A0"/>
  <polygon points="62,80 53,85 62,90" fill="#E040A0"/>
  <circle cx="50" cy="85" r="3.5" fill="#C010A0"/>
</svg>
